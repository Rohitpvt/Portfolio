<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - Rohit's Portfolio</title>
    <link rel="shortcut icon" href="./images/logo.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --orange-yellow-crayola: hsl(190, 100%, 55%);
            --accent-secondary: hsl(280, 100%, 65%);
        }
        body {
            font-family: "Inter", sans-serif;
            background: #050505;
            color: #d6d6d6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .ambient-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .glow {
            position: absolute; width: 60vw; height: 60vw;
            filter: blur(120px); opacity: 0.3; border-radius: 50%;
            animation: float 20s ease-in-out infinite alternate;
        }
        .blob-1 { background: var(--orange-yellow-crayola); top: -10%; left: -10%; }
        .blob-2 { background: var(--accent-secondary); bottom: -10%; right: -10%; animation-delay: -10s; }
        @keyframes float {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem;
            background: hsla(240, 5%, 8%, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid hsla(0, 0%, 100%, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 500px;
            width: 90%;
        }
        .success-icon {
            font-size: 5rem;
            background: linear-gradient(to right, var(--orange-yellow-crayola), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        h1 {
            font-family: "Outfit", sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #fafafa;
        }
        p {
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(to right, var(--orange-yellow-crayola), var(--accent-secondary));
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px hsla(190, 100%, 55%, 0.4);
        }
    </style>
</head>
<body>
    <div class="ambient-background">
        <div class="glow blob-1"></div>
        <div class="glow blob-2"></div>
    </div>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Thank You!</h1>
        <p>Your message has been received. I'll get back to you as soon as possible.</p>
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
    </div>
</body>
</html>
